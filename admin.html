<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Next Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {margin:0; padding:0; box-sizing:border-box; font-family: 'Hind Siliguri', sans-serif;}
    body {background:#f5f5f5; min-height:100vh;}
   .container {max-width:900px; margin:0 auto; padding:20px;}
   .admin-box {background:white; padding:25px; border-radius:15px; margin-bottom:20px;}
   .admin-box h2 {color:#D4AF37; margin-bottom:15px;}
   .admin-grid {display:grid; grid-template-columns:1fr 1fr; gap:15px;}
    input {width:100%; padding:15px; border:2px solid #ccc; border-radius:8px; font-size:16px;}
   .admin-btn {background:#16a34a; color:white; padding:12px; border:none; border-radius:8px; font-weight:700; cursor:pointer; grid-column:span 2; font-size:16px;}
   .order-card {border:2px solid #D4AF37; padding:15px; border-radius:10px; margin-bottom:15px;}
   .del-btn {background:#ef4444; color:white; padding:5px 15px; border:none; border-radius:5px; cursor:pointer; float:right;}
    #loginBox {max-width:400px; margin:100px auto; background:white; padding:40px; border-radius:20px; text-align:center;}
   .header {display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;}
   .back-btn {background:#2563eb; color:white; padding:10px 20px; border:none; border-radius:10px; cursor:pointer; text-decoration:none; display:inline-block;}
  </style>
</head>
<body>
<div class="container">
  <div id="loginBox">
    <h1 style="font-size:30px; margin-bottom:20px;">Admin Login</h1>
    <input type="password" id="adminPass" placeholder="Password: admin123" style="margin-bottom:15px;">
    <button id="loginBtn" style="background:#D4AF37; color:white; padding:15px; width:100%; border:none; border-radius:8px; font-size:18px; font-weight:700; cursor:pointer;">Login</button>
    <a href="index.html" style="display:block; margin-top:15px; font-size:14px; color:#666;">← Back to Site</a>
  </div>

  <div id="adminDashboard" style="display:none;">
    <div class="header">
      <h1 style="font-size:36px; font-weight:bold;">Admin Dashboard</h1>
      <a href="index.html" class="back-btn">View Site</a>
    </div>

    <div class="admin-box">
      <h2>Update Product</h2>
      <form id="productForm" class="admin-grid">
        <input required placeholder="Product Name" id="formName">
        <input required type="number" placeholder="Price" id="formPrice">
        <input required type="number" placeholder="Old Price" id="formOldPrice">
        <input required type="number" placeholder="Stock" id="formStock">
        <input required placeholder="Image URLs (কমা দিয়ে আলাদা কর)" id="formImgs" style="grid-column:span 2;">
        <button class="admin-btn">Update Product & Go to Site</button>
      </form>
    </div>

    <div class="admin-box">
      <h2>Customer Orders (<span id="orderCount">0</span>)</h2>
      <div id="ordersList"></div>
    </div>
  </div>
</div>

<script>
document.getElementById('loginBtn').onclick = function() {
  if (document.getElementById('adminPass').value === 'admin123') {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('adminDashboard').style.display = 'block';
    loadAdminData();
  } else {
    alert('Wrong Password');
  }
};

function loadAdminData() {
  const product = JSON.parse(localStorage.getItem('nextshop_product')) || {};
  document.getElementById('formName').value = product.name || '';
  document.getElementById('formPrice').value = product.price || '';
  document.getElementById('formOldPrice').value = product.oldPrice || '';
  document.getElementById('formStock').value = product.stock || '';
  document.getElementById('formImgs').value = (product.imgs || []).join(',');
  loadOrders();
}

function loadOrders() {
  const orders = JSON.parse(localStorage.getItem('nextshop_orders') || '[]');
  document.getElementById('orderCount').innerText = orders.length;
  const ordersList = document.getElementById('ordersList');
  ordersList.innerHTML = orders.length === 0? '<p style="color:#666;">No orders yet</p>' : '';

  orders.reverse().forEach(o => {
    const div = document.createElement('div');
    div.className = 'order-card';
    div.innerHTML = `
      <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
        <p style="font-weight:bold; font-size:18px;">${o.product} - ৳${o.price}</p>
        <button class="del-btn" onclick="deleteOrder(${o.id})">Complete</button>
      </div>
      <p><b>নাম:</b> ${o.customer.name}</p>
      <p><b>ফোন:</b> ${o.customer.phone}</p>
      <p><b>ঠিকানা:</b> ${o.customer.address}</p>
      <p style="color:#666; font-size:14px; margin-top:8px;">${o.date}</p>
    `;
    ordersList.appendChild(div);
  });
}

function deleteOrder(id) {
  let orders = JSON.parse(localStorage.getItem('nextshop_orders') || '[]');
  orders = orders.filter(o => o.id!== id);
  localStorage.setItem('nextshop_orders', JSON.stringify(orders));
  loadOrders();
}

document.getElementById('productForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const newProduct = {
    id: Date.now(),
    name: document.getElementById('formName').value,
    price: Number(document.getElementById('formPrice').value),
    oldPrice: Number(document.getElementById('formOldPrice').value),
    stock: Number(document.getElementById('formStock').value),
    imgs: document.getElementById('formImgs').value.split(',').map(i => i.trim())
  };
  localStorage.setItem('nextshop_product', JSON.stringify(newProduct));
  alert('Product Updated! এখন হোমপেজে দেখাবে।');
  window.location.href = 'index.html';
});
</script>
</body>
</html>
